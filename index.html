<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קטלוג מוצרים</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; padding: 20px; text-align: center; }
        input { width: 90%; max-width: 500px; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 25px; font-size: 16px; outline: none; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .product-card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: 0.2s; }
        img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        h3 { font-size: 16px; margin: 10px 0; color: #333; }
        .share-btn { background: #25D366; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <h2>קטלוג מוצרים לצוות</h2>
    <input type="text" id="searchBar" placeholder="חפש מוצר..." onkeyup="renderProducts()">

    <div class="gallery" id="productGallery"></div>

    <script>
        // --- כאן אתה מוסיף מוצרים! פשוט תעתיק שורה ותשנה את הפרטים ---
        const products = [
            { name: "מוצר ראשון", image: "link_to_image1.jpg" },
            { name: "מוצר שני", image: "link_to_image2.jpg" },
            { name: "עוד מוצר", image: "link_to_image3.jpg" }
        ];

        function renderProducts() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            const gallery = document.getElementById('productGallery');
            gallery.innerHTML = '';

            const filtered = products.filter(p => p.name.toLowerCase().includes(searchTerm));

            filtered.forEach(p => {
                gallery.innerHTML += `
                    <div class="product-card">
                        <img src="${p.image}" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <button class="share-btn" onclick="share('${p.image}', '${p.name}')">שלח בווטסאפ</button>
                    </div>
                `;
            });
        }

        function share(url, name) {
            const text = " " + name + ": " + window.location.origin + window.location.pathname + url;
            window.open("https://wa.me/?text=" + encodeURIComponent(text), '_blank');
        }

        // טעינה ראשונית
        renderProducts();
    </script>
</body>
</html>
