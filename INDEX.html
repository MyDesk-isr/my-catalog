<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קטלוג מוצרים מהיר</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; padding: 20px; text-align: center; }
        input { width: 90%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 25px; font-size: 16px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .product-card { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
        .product-card:hover { transform: scale(1.05); }
        img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }
        h3 { font-size: 14px; margin: 10px 0; color: #333; }
        .share-btn { background: #25D366; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <h2>קטלוג מוצרים לצוות</h2>
    <input type="text" id="searchBar" placeholder="חפש מוצר..." onkeyup="filterProducts()">

    <div class="gallery" id="productGallery">
        <div class="product-card" data-name="שולחן עץ אלון">
            <img src="https://via.placeholder.com/150" alt="שולחן">
            <h3>שולחן עץ אלון</h3>
            <button class="share-btn" onclick="shareToWhatsApp('https://via.placeholder.com/150', 'שולחן עץ אלון')">שלח בווטסאפ</button>
        </div>
    </div>

    <script>
        function filterProducts() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('product-card');
            
            for (let card of cards) {
                let name = card.getAttribute('data-name').toLowerCase();
                card.style.display = name.includes(input) ? "block" : "none";
            }
        }

        function shareToWhatsApp(url, name) {
            const text = "היי, הנה פרטים על " + name + ": " + url;
            const whatsappUrl = "https://wa.me/?text=" + encodeURIComponent(text);
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
